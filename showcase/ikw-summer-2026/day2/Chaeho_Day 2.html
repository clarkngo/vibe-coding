<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Royal Derby | Horse Racing Betting</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #07131f;
      --bg-soft: #0f2134;
      --panel: rgba(255,255,255,0.06);
      --panel-strong: rgba(255,255,255,0.1);
      --line: rgba(255,255,255,0.14);
      --text: #f7f7fb;
      --muted: #a8b4c2;
      --gold: #f6b83d;
      --gold-soft: rgba(246,184,61,0.16);
      --red: #ff5e5b;
      --green: #48d29d;
      --shadow: 0 22px 50px rgba(0,0,0,0.28);
      --radius: 20px;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: 'Inter', sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(246,184,61,0.24), transparent 28%),
        linear-gradient(135deg, #06111d 0%, #0d2438 100%);
    }

    a { color: inherit; text-decoration: none; }
    button, select, input { font: inherit; }

    .wrap {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 20px 80px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 18px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px);
      margin-bottom: 24px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .brand-badge {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--gold), #ff7f29);
      display: grid;
      place-items: center;
      color: #1d1200;
      font-weight: 800;
    }

    .topbar .nav {
      display: flex;
      gap: 18px;
      color: var(--muted);
      font-size: 14px;
    }

    .balance-pill {
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(246,184,61,0.16);
      border: 1px solid rgba(246,184,61,0.3);
      color: var(--gold);
      font-weight: 700;
      font-size: 14px;
      margin-left: 12px;
    }

    .balance-pill.warning {
      color: #ff8c81;
      border-color: rgba(255,124,114,0.45);
    }

    .hero {
      display: grid;
      grid-template-columns: 1.2fr 0.8fr;
      gap: 22px;
      align-items: stretch;
      margin-bottom: 24px;
    }

    .hero-card, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .hero-card {
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .hero-card::after {
      content: "";
      position: absolute;
      inset: auto -40px -60px auto;
      width: 220px;
      height: 220px;
      background: radial-gradient(circle, rgba(246,184,61,0.22), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 12px;
      border: 1px solid var(--gold-soft);
      border-radius: 999px;
      color: var(--gold);
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.16em;
      margin-bottom: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(32px, 4.6vw, 52px);
      line-height: 1.05;
      margin: 0 0 12px;
    }

    .hero-card p { color: var(--muted); margin: 0 0 18px; max-width: 60ch; }

    .hero-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .btn {
      border: none;
      cursor: pointer;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn-primary {
      background: linear-gradient(135deg, var(--gold), #ff8c2f);
      color: #181100;
      box-shadow: 0 10px 24px rgba(246,184,61,0.25);
    }
    .btn-secondary {
      background: rgba(255,255,255,0.08);
      color: var(--text);
      border: 1px solid var(--line);
    }

    .hero-side {
      padding: 24px;
      display: grid;
      gap: 16px;
    }

    .metric {
      padding: 14px 16px;
      border-radius: 16px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
    }
    .metric .label { color: var(--muted); font-size: 12px; text-transform: uppercase; letter-spacing: 0.16em; }
    .metric .value { font-size: 22px; font-weight: 700; margin-top: 4px; }

    .section-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin: 30px 0 14px;
      font-weight: 700;
    }

    .section-title .muted { color: var(--muted); font-size: 13px; }

    .race-grid {
      display: grid;
      grid-template-columns: repeat(3, minmax(0,1fr));
      gap: 16px;
    }

    .live-race {
      margin-top: 24px;
      padding: 20px;
      border-radius: 20px;
      background: linear-gradient(135deg, rgba(246,184,61,0.16), rgba(255,255,255,0.06));
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
    }

    .track {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      background: linear-gradient(180deg, #0d2b41 0%, #08131e 100%);
      border: 1px solid rgba(255,255,255,0.12);
      overflow: hidden;
    }

    .track-inner {
      position: relative;
      border-radius: 12px;
      border: 2px solid rgba(255,255,255,0.16);
      padding: 10px 8px;
      background:
        linear-gradient(90deg, transparent 0 10%, rgba(255,255,255,0.04) 10% 20%, transparent 20% 30%, rgba(255,255,255,0.04) 30% 40%, transparent 40% 50%, rgba(255,255,255,0.04) 50% 60%, transparent 60% 70%, rgba(255,255,255,0.04) 70% 80%, transparent 80% 90%, rgba(255,255,255,0.04) 90% 100%);
      min-height: 280px;
    }

    .lane {
      position: relative;
      height: 36px;
      margin-bottom: 10px;
      border-radius: 999px;
      background: rgba(255,255,255,0.05);
      overflow: hidden;
    }

    .lane:last-child { margin-bottom: 0; }

    .horse {
      position: absolute;
      top: 4px;
      left: 4px;
      width: 28px;
      height: 28px;
      border-radius: 50% 50% 45% 45%;
      background: linear-gradient(135deg, #ffd56b, #ff7f29);
      box-shadow: 0 0 0 3px rgba(255,255,255,0.15);
      transition: left 0.65s cubic-bezier(0.22, 1, 0.36, 1), transform 0.2s ease, box-shadow 0.2s ease;
      display: grid;
      place-items: center;
      font-size: 12px;
      font-weight: 800;
      color: #1e1300;
      will-change: left, transform;
    }
    .horse.leading {
      transform: scale(1.18);
      box-shadow: 0 0 0 4px rgba(255,214,107,0.65), 0 0 16px rgba(255,214,107,0.35);
    }
    .horse.winner {
      background: linear-gradient(135deg, #fff4a5, #ffdd60);
      box-shadow: 0 0 0 4px rgba(255,255,255,0.85), 0 0 18px rgba(255,255,255,0.4);
      color: #1e1300;
    }

    .lane-label {
      position: absolute;
      left: 8px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 12px;
      font-weight: 700;
      color: var(--text);
      z-index: 2;
      pointer-events: none;
      width: 90px;
      text-overflow: ellipsis;
      overflow: hidden;
      white-space: nowrap;
    }

    .finish-line {
      position: absolute;
      top: 0;
      right: 24px;
      width: 6px;
      height: 100%;
      background: repeating-linear-gradient(180deg, #fff 0 6px, transparent 6px 12px);
      box-shadow: 0 0 18px rgba(255,255,255,0.65);
    }
    .finish-line::before {
      content: 'FINISH';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) rotate(90deg);
      font-size: 10px;
      letter-spacing: 0.18em;
      color: #fff;
      text-transform: uppercase;
      text-shadow: 0 0 10px rgba(255,255,255,0.7);
      white-space: nowrap;
    }
    .track-inner::after {
      content: '';
      position: absolute;
      top: 0;
      right: 8px;
      width: 80px;
      height: 100%;
      background: linear-gradient(90deg, transparent 0%, rgba(255,255,255,0.08) 40%, rgba(255,255,255,0.12) 60%, transparent 100%);
      pointer-events: none;
    }

    .ticker {
      margin-top: 12px;
      padding: 12px 14px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      color: var(--muted);
      min-height: 48px;
      display: flex;
      align-items: center;
    }

    .ticker strong { color: var(--text); }

    .race-card {
      padding: 18px;
      border-radius: 18px;
      background: var(--panel);
      border: 1px solid var(--line);
      display: grid;
      gap: 10px;
    }

    .race-head { display: flex; justify-content: space-between; align-items: center; }
    .race-name { font-weight: 700; }
    .race-time { color: var(--gold); font-size: 13px; font-weight: 700; }
    .race-meta { color: var(--muted); font-size: 13px; }
    .horse-list { display: grid; gap: 8px; margin-top: 4px; }
    .horse-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 8px 10px; border-radius: 12px; background: rgba(255,255,255,0.04);
    }
    .horse-row strong { font-size: 14px; color: #111; }
    .odds { color: var(--gold); font-weight: 700; }
    .race-card .bet-btn { margin-top: 4px; }

    .layout {
      display: grid;
      grid-template-columns: minmax(0, 1.25fr) minmax(320px, 0.75fr);
      gap: 20px;
      margin-top: 24px;
      align-items: start;
    }

    .panel { padding: 20px; }
    .panel h3 { margin: 0 0 8px; }
    .panel .sub { color: var(--muted); font-size: 14px; margin: 0 0 16px; }

    .horse-stats {
      display: grid;
      gap: 8px;
      margin-bottom: 12px;
    }

    .horse-stat {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px 10px;
      border-radius: 10px;
      background: rgba(255,255,255,0.05);
      border: 1px solid var(--line);
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease, border-color 0.2s ease, transform 0.2s ease;
    }
    .horse-stat:hover {
      background: rgba(255,255,255,0.1);
      transform: translateY(-1px);
    }
    .horse-stat.selected {
      background: linear-gradient(135deg, rgba(246,184,61,0.24), rgba(255,255,255,0.12));
      border-color: rgba(246,184,61,0.5);
      color: #ffffff;
    }
    .horse-stat.selected span:first-child {
      font-weight: 700;
      color: #ffffff;
    }
    .horse-stat .meta {
      color: #ffdca8;
    }

    .bet-form { display: grid; gap: 12px; }
    .field { display: grid; gap: 6px; }
    .field label { font-size: 13px; color: var(--muted); }
    .field select, .field input {
      padding: 12px 14px; border-radius: 12px; border: 1px solid var(--line);
      background: rgba(6, 13, 24, 0.95); color: var(--text);
    }
    .field select option {
      background: #0f2134;
      color: var(--text);
    }
    .bet-summary {
      padding: 12px 14px; border-radius: 14px; background: rgba(246,184,61,0.12); border: 1px solid rgba(246,184,61,0.3);
      color: #ffe2b3; font-size: 14px;
    }
    .message { min-height: 22px; color: var(--green); font-weight: 600; margin-top: 6px; }

    @media (max-width: 960px) {
      .hero, .layout { grid-template-columns: 1fr; }
      .race-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="topbar">
      <div class="brand">
        <div class="brand-badge">R</div>
        <span>Royal Derby</span>
      </div>
      <nav class="nav">
        <a href="#races">Races</a>
        <a href="#bet-slip">Bet Slip</a>
        <a href="#live">Live Feed</a>
      </nav>
      <div class="balance-pill" id="balanceDisplay">보유 금액: $1000</div>
    </header>


    <div class="layout">
      <section class="live-race" id="live">
        <div class="section-title">
          <span>실시간 시뮬레이션 경주</span>
          <span class="muted">6마리 · 라이브 진행 중</span>
        </div>
        <div class="track" id="track">
          <div class="track-inner">
            <div class="finish-line"></div>
            <div class="lane"><div class="lane-label">Silver Arrow</div><div class="horse" data-name="Silver Arrow" style="left: 10px">🐎</div></div>
            <div class="lane"><div class="lane-label">Midnight Blaze</div><div class="horse" data-name="Midnight Blaze" style="left: 10px">🐎</div></div>
            <div class="lane"><div class="lane-label">Golden Crest</div><div class="horse" data-name="Golden Crest" style="left: 10px">🐎</div></div>
            <div class="lane"><div class="lane-label">Storm Runner</div><div class="horse" data-name="Storm Runner" style="left: 10px">🐎</div></div>
            <div class="lane"><div class="lane-label">Velvet Wind</div><div class="horse" data-name="Velvet Wind" style="left: 10px">🐎</div></div>
            <div class="lane"><div class="lane-label">Fast Lane</div><div class="horse" data-name="Fast Lane" style="left: 10px">🐎</div></div>
          </div>
        </div>
        <div class="ticker" id="ticker">경주가 시작되었습니다. 말들이 출발선을 빠져나가고 있습니다.</div>
      </section>

      <section class="panel" id="bet-slip">
        <h3>베팅 슬립</h3>
        <p class="sub">마음에 드는 말마필을 선택해 배팅을 완료하세요.</p>
        <div class="horse-stats" id="horseStats"></div>
        <form class="bet-form" id="betForm">
          <div class="field">
            <label for="horseSelect">마필 선택</label>
            <select id="horseSelect">
              <option value="Silver Arrow">Silver Arrow</option>
              <option value="Midnight Blaze">Midnight Blaze</option>
              <option value="Golden Crest">Golden Crest</option>
              <option value="Storm Runner">Storm Runner</option>
              <option value="Velvet Wind">Velvet Wind</option>
              <option value="Fast Lane">Fast Lane</option>
            </select>
          </div>
          <div class="field">
            <label for="stakeInput">베팅 금액</label>
            <input id="stakeInput" type="number" min="10" step="10" value="50" />
          </div>
          <div class="bet-summary" id="betSummary">선택한 말: Silver Arrow · 배당률: 3.20</div>
          <button class="btn btn-primary" type="submit">베팅 확정</button>
          <div class="message" id="message"></div>
        </form>
      </section>
    </div>
  </div>

  <script>
    const betButtons = document.querySelectorAll('.bet-btn');
    const horseSelect = document.getElementById('horseSelect');
    const stakeInput = document.getElementById('stakeInput');
    const betSummary = document.getElementById('betSummary');
    const message = document.getElementById('message');
    const form = document.getElementById('betForm');
    const ticker = document.getElementById('ticker');
    const horseStats = document.getElementById('horseStats');
    const balanceDisplay = document.getElementById('balanceDisplay');
    const horses = [
      { name: 'Silver Arrow', progress: 8, winRate: 38, odds: 2.60 },
      { name: 'Midnight Blaze', progress: 7, winRate: 24, odds: 4.10 },
      { name: 'Golden Crest', progress: 6, winRate: 16, odds: 6.20 },
      { name: 'Storm Runner', progress: 5, winRate: 10, odds: 9.50 },
      { name: 'Velvet Wind', progress: 4, winRate: 7, odds: 13.40 },
      { name: 'Fast Lane', progress: 3, winRate: 5, odds: 18.20 }
    ];
    let raceStarted = false;
    let raceInterval = null;
    let balance = 1000;

    function updateHorseWinRates() {
      horses.forEach((horse) => {
        const drift = (Math.random() * 6) - 3;
        horse.winRate = Math.max(5, Math.min(95, Math.round(horse.winRate + drift)));
      });
      renderHorseStats();
      updateSummary();
    }

    function updateBalanceDisplay() {
      balanceDisplay.textContent = `보유 금액: $${balance.toFixed(0)}`;
      balanceDisplay.classList.toggle('warning', balance < 200);
    }

    const TRACK_MAX_LEFT = 92;

    function getHorseLeftValue(horse) {
      return 2 + Math.min(TRACK_MAX_LEFT, horse.progress * 0.9);
    }

    function updateRaceView() {
      const horseEls = document.querySelectorAll('.horse');
      const leader = horses.reduce((best, current) => {
        return getHorseLeftValue(current) > getHorseLeftValue(best) ? current : best;
      }, horses[0]);

      horseEls.forEach((horseEl, index) => {
        const horse = horses[index];
        horseEl.style.left = `${getHorseLeftValue(horse)}%`;
        horseEl.classList.toggle('leading', horse.name === leader.name);
      });
    }

    function resetRacePositions() {
      horses.forEach((horse, index) => {
        horse.progress = 8 + index * 0.4;
      });
      updateRaceView();
    }

    function runSimulation() {
      if (raceStarted) return;
      raceStarted = true;

      resetRacePositions();
      let step = 0;
      raceInterval = window.setInterval(() => {
          horses.forEach((horse) => {
          const boost = Math.random() * 2.2 + 0.8;
          horse.progress = Math.min(100, horse.progress + boost);
        });

        updateRaceView();
        updateHorseWinRates();

        const leader = horses.reduce((best, current) => {
          return getHorseLeftValue(current) > getHorseLeftValue(best) ? current : best;
        }, horses[0]);
        const leaderName = leader ? leader.name : '선두 마필';

        const finishLeader = horses.reduce((best, current) => {
          return getHorseLeftValue(current) > getHorseLeftValue(best) ? current : best;
        }, horses[0]);

        if (getHorseLeftValue(finishLeader) >= TRACK_MAX_LEFT) {
          window.clearInterval(raceInterval);
          const horseEls = document.querySelectorAll('.horse');
          horseEls.forEach((horseEl) => {
            horseEl.classList.toggle('winner', horseEl.dataset.name === finishLeader.name);
            horseEl.classList.remove('leading');
          });
          ticker.innerHTML = `<strong>${finishLeader.name}</strong>이(가) 흰색 점선을 먼저 통과해 우승했습니다!`;
          raceStarted = false;
          return;
        }

        if (step === 0) {
          ticker.textContent = `${leaderName}이(가) 먼저 질주하고 있습니다.`;
        } else if (step === 1) {
          ticker.textContent = `${leaderName}이(가) 선두를 지키며 속도를 올리고 있습니다.`;
        } else if (step === 2) {
          ticker.textContent = `${leaderName}이(가) 최종 직선으로 진입했습니다.`;
        } else {
          ticker.textContent = `${leaderName}이(가) 전진 중입니다.`;
        }
        step += 1;
      }, 650);
    }

    betButtons.forEach((button) => {
      button.addEventListener('click', () => {
        horseSelect.value = button.dataset.horse;
        updateSummary();
        message.textContent = `${button.dataset.horse} 선택됨`;
      });
    });

    function updateSelectedHorse() {
      const selectedName = horseSelect.value;
      horseStats.querySelectorAll('.horse-stat').forEach((stat) => {
        stat.classList.toggle('selected', stat.dataset.name === selectedName);
      });
    }

    function renderHorseStats() {
      horseStats.innerHTML = horses.map((horse) => `
        <div class="horse-stat ${horse.name === horseSelect.value ? 'selected' : ''}" data-name="${horse.name}">
          <span>${horse.name}</span>
          <span class="meta">승률 ${horse.winRate}% · 배당 ${horse.odds.toFixed(1)}배</span>
        </div>
      `).join('');

      horseStats.querySelectorAll('.horse-stat').forEach((stat) => {
        stat.addEventListener('click', () => {
          horseSelect.value = stat.dataset.name;
          updateSummary();
          updateSelectedHorse();
          message.textContent = `${stat.dataset.name} 선택됨`;
          message.style.color = '#48d29d';
        });
      });
    }

    function getOddsForHorse(name) {
      const horse = horses.find((item) => item.name === name);
      return horse ? horse.odds.toFixed(1) : '0.0';
    }

    function updateSummary() {
      const horse = horseSelect.value;
      const stake = Number(stakeInput.value || 0);
      const odds = getOddsForHorse(horse);
      const payout = (stake * Number(odds)).toFixed(0);
      const selectedHorse = horses.find((item) => item.name === horse);
      const winRateText = selectedHorse ? ` · 승률 <strong>${selectedHorse.winRate}%</strong>` : '';
      betSummary.innerHTML = `선택한 말: <strong>${horse}</strong>${winRateText} · 배당률: <strong>${odds}배</strong> · 예상 수익: <strong>$${payout}</strong>`;
    }

    horseSelect.addEventListener('change', () => {
      updateSummary();
      updateSelectedHorse();
    });
    stakeInput.addEventListener('input', updateSummary);

    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const horse = horseSelect.value;
      const stake = Number(stakeInput.value || 0);
      if (stake < 10) {
        message.textContent = '최소 베팅 금액은 10달러입니다.';
        message.style.color = '#ff7b72';
        return;
      }
      if (stake > balance) {
        message.textContent = '보유 금액이 부족합니다.';
        message.style.color = '#ff7b72';
        return;
      }
      balance -= stake;
      updateBalanceDisplay();
      message.textContent = `${horse}에 $${stake} 베팅이 성공적으로 접수되었습니다. 남은 잔액: $${balance}`;
      message.style.color = '#48d29d';
      runSimulation();
    });

    renderHorseStats();
    updateSummary();
    updateSelectedHorse();
    updateBalanceDisplay();
    updateHorseWinRates();
  </script>
</body>
</html>
