<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>가까운 여정 · 내 위치 기반 여행 코스</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=IBM+Plex+Sans+KR:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0f231d;
      --surface: #17332c;
      --surface-2: #1e3e35;
      --line: #2c4b41;
      --text: #f3efe6;
      --text-muted: #9fb8ae;
      --accent: #f2a65a;
      --accent-soft: #f2a65a22;
      --danger: #e5836b;
      --radius: 14px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans KR', sans-serif;
      line-height: 1.55;
      min-height: 100vh;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 20px 100px;
    }

    .top-area {
      display: grid;
      grid-template-columns: 1.05fr 0.95fr;
      gap: 24px;
      align-items: start;
    }

    .left-column,
    .right-column {
      min-width: 0;
    }

    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--accent);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 14px;
    }

    .eyebrow::before {
      content: "";
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-soft);
    }

    .site-name {
      font-family: 'Fraunces', serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--text);
      margin: 0 0 12px;
      text-transform: uppercase;
    }

    h1 {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: clamp(30px, 5vw, 44px);
      line-height: 1.12;
      margin: 0 0 12px;
      letter-spacing: -0.01em;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
      font-weight: 500;
    }

    .title-accent {
      color: var(--accent);
      font-weight: 700;
      font-style: normal;
    }

    .title-default {
      color: var(--text);
    }

    .sub {
      color: var(--text-muted);
      font-size: 15px;
      max-width: 46ch;
      margin: 0 0 36px;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 22px;
      margin-bottom: 20px;
    }

    .panel-title {
      font-size: 12px;
      font-family: 'IBM Plex Mono', monospace;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-muted);
      margin: 0 0 14px;
    }

    .loc-row {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    .loc-input {
      flex: 1;
      min-width: 200px;
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 14px;
      font-size: 14px;
      font-family: inherit;
    }

    .loc-input::placeholder { color: var(--text-muted); }
    .loc-input:focus { outline: 2px solid var(--accent); outline-offset: 1px; }

    button {
      font-family: inherit;
      cursor: pointer;
      border: none;
    }

    .btn-ghost {
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text);
      border-radius: 10px;
      padding: 12px 16px;
      font-size: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      white-space: nowrap;
    }

    .btn-ghost:hover { border-color: var(--accent); }
    .btn-ghost:focus-visible { outline: 2px solid var(--accent); outline-offset: 1px; }

    .loc-status {
      margin-top: 10px;
      font-size: 13px;
      color: var(--text-muted);
      min-height: 18px;
    }

    .loc-status.ok { color: var(--accent); }
    .loc-status.err { color: var(--danger); }

    .chips-label {
      font-size: 13px;
      color: var(--text-muted);
      margin: 18px 0 8px;
    }

    .chips { display: flex; flex-wrap: wrap; gap: 8px; }

    .chip {
      background: var(--surface-2);
      border: 1px solid var(--line);
      color: var(--text-muted);
      border-radius: 999px;
      padding: 8px 14px;
      font-size: 13px;
      transition: all 0.15s ease;
    }

    .chip[aria-pressed="true"] {
      background: var(--accent-soft);
      border-color: var(--accent);
      color: var(--accent);
    }

    .duration-row { display: flex; gap: 8px; margin-top: 18px; }
    .duration-row .chip { flex: 1; text-align: center; }

    .generate-btn {
      width: 100%;
      margin-top: 22px;
      background: var(--accent);
      color: #16281f;
      font-weight: 600;
      font-size: 15px;
      border-radius: 12px;
      padding: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .generate-btn:hover { filter: brightness(1.06); }
    .generate-btn:disabled { opacity: 0.55; cursor: not-allowed; filter: none; }

    .trail {
      margin-top: 40px;
      position: relative;
    }

    .trail-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 22px;
      flex-wrap: wrap;
      gap: 8px;
    }

    .trail-header h2 {
      font-family: 'Fraunces', serif;
      font-size: 22px;
      font-weight: 600;
      margin: 0;
    }

    .trail-header .place-name { color: var(--accent); }
    .trail-meta {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--text-muted);
    }

    .map-card {
      margin-top: 24px;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }

    .map-toolbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      border-bottom: 1px solid var(--line);
      background: var(--surface-2);
    }

    .map-title {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    .map-link {
      color: var(--text);
      text-decoration: none;
      font-size: 12px;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 6px 10px;
    }

    .map-link:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .map-card iframe {
      width: 100%;
      min-height: 320px;
      border: 0;
      display: block;
      background: #dbe4e0;
    }

    .stop {
      position: relative;
      display: flex;
      gap: 18px;
      padding-bottom: 30px;
    }

    .stop:last-child { padding-bottom: 0; }

    .stop-line {
      position: relative;
      width: 34px;
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stop-num {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      background: var(--surface);
      border: 1.5px solid var(--accent);
      color: var(--accent);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      z-index: 1;
    }

    .stop-track {
      flex: 1;
      width: 2px;
      background-image: linear-gradient(var(--line) 60%, transparent 0%);
      background-size: 2px 8px;
      background-repeat: repeat-y;
      margin-top: 2px;
    }

    .stop:last-child .stop-track { display: none; }

    .stop-card {
      flex: 1;
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 18px;
    }

    .stop-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 10px;
      margin-bottom: 6px;
    }

    .stop-name {
      font-family: 'Fraunces', serif;
      font-weight: 600;
      font-size: 17px;
    }

    .stop-time {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      color: var(--accent);
      white-space: nowrap;
      padding-top: 2px;
    }

    .stop-cat {
      display: inline-block;
      font-size: 11px;
      color: var(--text-muted);
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 2px 9px;
      margin-bottom: 8px;
    }

    .stop-desc {
      font-size: 14px;
      color: var(--text-muted);
      margin: 0 0 6px;
    }

    .stop-addr {
      font-size: 12.5px;
      color: var(--text-muted);
      opacity: 0.8;
    }

    .state-box {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
    }

    .state-box .spinner {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      border: 2.5px solid var(--line);
      border-top-color: var(--accent);
      margin: 0 auto 16px;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
    .state-box .msg { font-size: 14px; }
    .state-box .msg.err { color: var(--danger); }

    footer {
      margin-top: 60px;
      text-align: center;
      font-size: 12px;
      color: var(--text-muted);
      font-family: 'IBM Plex Mono', monospace;
    }

    @media (prefers-reduced-motion: reduce) {
      .spinner { animation: none; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="eyebrow">Nearby Route Planner</div>
    <p class="site-name"><span class="title-accent">지</span><span class="title-accent">리</span><span class="title-accent">는</span> <span class="title-accent">여행</span></p>
    <h1><span class="title-default">지금</span> <em>이 자리</em><span class="title-default">에서</span><br /><span class="title-default">시작하는</span> <span class="title-accent">여행</span></h1>
    <p class="sub">위치만 알려주면 도보 또는 근거리로 다닐 수 있는 코스를 순서대로 짜드립니다. 바로 열어볼 수 있는 데모 형태로 구성했습니다.</p>

    <div class="top-area">
      <div class="left-column">
        <div class="panel">
          <p class="panel-title">01 — 위치</p>
          <div class="loc-row">
            <input class="loc-input" id="locInput" type="text" placeholder="예: 서울 성수동, 부산 해운대 / 비워두고 위치 찾기를 눌러도 됩니다" />
            <button class="btn-ghost" id="geoBtn">📍 내 위치 찾기</button>
          </div>
          <div class="loc-status" id="locStatus"></div>

          <p class="chips-label">02 — 관심사 (여러 개 선택 가능)</p>
          <div class="chips" id="interestChips">
            <button class="chip" data-v="맛집">맛집</button>
            <button class="chip" data-v="카페">카페</button>
            <button class="chip" data-v="자연/공원">자연·공원</button>
            <button class="chip" data-v="역사/문화">역사·문화</button>
            <button class="chip" data-v="쇼핑">쇼핑</button>
            <button class="chip" data-v="야경">야경</button>
            <button class="chip" data-v="사진 명소">사진 명소</button>
          </div>

          <p class="chips-label">03 — 코스 길이</p>
          <div class="duration-row" id="durationChips">
            <button class="chip" data-v="반나절(3~4시간)" aria-pressed="true">반나절</button>
            <button class="chip" data-v="하루(6~8시간)">하루 종일</button>
            <button class="chip" data-v="저녁(2~3시간)">저녁 나들이</button>
          </div>

          <button class="generate-btn" id="genBtn">코스 만들기</button>
        </div>

        <div id="resultArea"></div>
      </div>

      <div class="right-column">
        <div class="panel" id="mapPanel">
          <p class="panel-title">04 — 지도</p>
          <div class="map-card">
            <div class="map-toolbar">
              <div class="map-title">Google Maps</div>
              <a class="map-link" id="mapLink" href="#" target="_blank" rel="noopener noreferrer">지도 열기</a>
            </div>
            <iframe id="mapFrame" title="Google Maps preview" loading="lazy" referrerpolicy="no-referrer-when-downgrade" src="https://www.google.com/maps?q=%EC%84%9C%EC%9A%B8&z=13&output=embed" allowfullscreen></iframe>
          </div>
        </div>
      </div>
    </div>

    <footer>made for wandering nearby</footer>
  </div>

  <script>
    const locInput = document.getElementById('locInput');
    const geoBtn = document.getElementById('geoBtn');
    const locStatus = document.getElementById('locStatus');
    const genBtn = document.getElementById('genBtn');
    const resultArea = document.getElementById('resultArea');
    const interestChips = document.getElementById('interestChips');
    const durationChips = document.getElementById('durationChips');
    const mapFrame = document.getElementById('mapFrame');
    const mapLink = document.getElementById('mapLink');

    function setupChipGroup(container, { multi }) {
      container.querySelectorAll('.chip').forEach((chip) => {
        chip.addEventListener('click', () => {
          if (multi) {
            const now = chip.getAttribute('aria-pressed') === 'true';
            chip.setAttribute('aria-pressed', String(!now));
          } else {
            container.querySelectorAll('.chip').forEach((c) => c.setAttribute('aria-pressed', 'false'));
            chip.setAttribute('aria-pressed', 'true');
          }
        });
      });
    }

    setupChipGroup(interestChips, { multi: true });
    setupChipGroup(durationChips, { multi: false });

    function getSelected(container) {
      return [...container.querySelectorAll('.chip[aria-pressed="true"]')].map((c) => c.dataset.v);
    }

    geoBtn.addEventListener('click', () => {
      if (!navigator.geolocation) {
        locStatus.textContent = '이 브라우저는 위치 정보를 지원하지 않습니다. 직접 입력해 주세요.';
        locStatus.className = 'loc-status err';
        return;
      }

      locStatus.textContent = '위치를 확인하는 중입니다…';
      locStatus.className = 'loc-status';
      geoBtn.disabled = true;

      navigator.geolocation.getCurrentPosition(
        (pos) => {
          const lat = pos.coords.latitude;
          const lon = pos.coords.longitude;
          const fallbackLabel = `${lat.toFixed(3)}, ${lon.toFixed(3)}`;
          locInput.value = fallbackLabel;
          locStatus.textContent = '현재 위치 좌표를 확인했습니다. 입력창에 표시해 두었습니다.';
          locStatus.className = 'loc-status ok';
          geoBtn.disabled = false;
        },
        () => {
          geoBtn.disabled = false;
          locStatus.textContent = '위치 접근이 거부되었습니다. 위 입력창에 지역명을 직접 적어주세요.';
          locStatus.className = 'loc-status err';
        },
        { enableHighAccuracy: true, timeout: 10000 }
      );
    });

    function renderState(kind, message) {
      if (kind === 'loading') {
        resultArea.innerHTML = `<div class="state-box"><div class="spinner"></div><div class="msg">${message}</div></div>`;
      } else if (kind === 'error') {
        resultArea.innerHTML = `<div class="state-box"><div class="msg err">${message}</div></div>`;
      } else {
        resultArea.innerHTML = '';
      }
    }

    function escapeHtml(str) {
      return String(str ?? '').replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
    }

    function getDurationText(duration) {
      if (duration.includes('하루')) return '약 6~8시간';
      if (duration.includes('저녁')) return '약 2~3시간';
      return '약 3~4시간';
    }

    function buildDemoItinerary(locationLabel, interests, duration) {
      const pickedInterests = interests.length ? interests : ['맛집', '카페'];
      const templates = {
        맛집: [
          { name: `${locationLabel}의 숨은 맛집`, category: '맛집', description: '현지인에게도 사랑받는 메뉴와 편안한 분위기를 갖춘 곳으로, 첫 번째 정차 지점으로 만족도가 높습니다.', address: '장소 주변 상권' },
          { name: `${locationLabel}의 가성비 식당`, category: '맛집', description: '간단한 식사와 여유로운 시간 보내기에 좋은 포인트입니다.', address: '중심가 바로 근처' }
        ],
        카페: [
          { name: `${locationLabel}의 조용한 카페`, category: '카페', description: '커피와 디저트를 즐기며 산책 전후로 쉬어가기 좋은 공간입니다.', address: '거리의 한복판' },
          { name: `${locationLabel}의 감성 카페`, category: '카페', description: '사진과 휴식이 모두 가능한 분위기 있는 카페입니다.', address: '포토존이 많은 골목' }
        ],
        '자연/공원': [
          { name: `${locationLabel}의 공원 산책로`, category: '자연', description: '바람을 느끼며 천천히 걷기 좋은 공간으로, 코스의 여유를 더해줍니다.', address: '공원 입구' }
        ],
        '역사/문화': [
          { name: `${locationLabel}의 문화 공간`, category: '문화', description: '지역의 이야기를 느낄 수 있는 전시나 명소로, 여행의 맥락을 더해줍니다.', address: '문화거리' }
        ],
        쇼핑: [
          { name: `${locationLabel}의 쇼핑 거리`, category: '쇼핑', description: '간식과 기념품을 함께 챙기기 좋은 구역입니다.', address: '상가 중심부' }
        ],
        야경: [
          { name: `${locationLabel}의 야경 포인트`, category: '야경', description: '저녁 무렵의 분위기를 살려주는 조용한 전망 지점입니다.', address: '전망이 좋은 지점' }
        ],
        '사진 명소': [
          { name: `${locationLabel}의 사진 명소`, category: '사진', description: '색감과 구성이 좋아 기록 남기기 좋은 곳입니다.', address: '눈에 띄는 포인트' }
        ]
      };

      const pool = pickedInterests.flatMap((interest) => templates[interest] || []);
      const baseStops = pool.length ? pool : templates['맛집'];
      const stops = baseStops.slice(0, 5).map((stop, idx) => ({
        ...stop,
        time: idx === 0 ? '12:00' : idx === 1 ? '13:00' : idx === 2 ? '15:00' : idx === 3 ? '16:30' : '18:00'
      }));

      return {
        total_duration: getDurationText(duration),
        stops
      };
    }

    function getGoogleMapsEmbedUrl(locationLabel, stops) {
      const query = [locationLabel, ...stops.map((stop) => [stop.name, stop.address].filter(Boolean).join(' '))]
        .filter(Boolean)
        .slice(0, 8)
        .join(' | ');
      return `https://www.google.com/maps?q=${encodeURIComponent(query)}&z=13&output=embed`;
    }

    function getGoogleMapsOpenUrl(locationLabel, stops) {
      const query = [locationLabel, ...stops.map((stop) => [stop.name, stop.address].filter(Boolean).join(' '))]
        .filter(Boolean)
        .slice(0, 8)
        .join(' ');
      return `https://www.google.com/maps/search/${encodeURIComponent(query)}`;
    }

    function renderItinerary(data, locationLabel) {
      const stopsHtml = data.stops.map((s, i) => `
        <div class="stop">
          <div class="stop-line">
            <div class="stop-num">${i + 1}</div>
            <div class="stop-track"></div>
          </div>
          <div class="stop-card">
            <div class="stop-top">
              <div class="stop-name">${escapeHtml(s.name)}</div>
              <div class="stop-time">${escapeHtml(s.time)}</div>
            </div>
            <div class="stop-cat">${escapeHtml(s.category)}</div>
            <p class="stop-desc">${escapeHtml(s.description)}</p>
            ${s.address ? `<div class="stop-addr">${escapeHtml(s.address)}</div>` : ''}
          </div>
        </div>
      `).join('');

      const embedUrl = getGoogleMapsEmbedUrl(locationLabel, data.stops);
      const openUrl = getGoogleMapsOpenUrl(locationLabel, data.stops);

      mapFrame.src = embedUrl;
      mapLink.href = openUrl;
      mapLink.textContent = '지도 열기';

      resultArea.innerHTML = `
        <div class="trail">
          <div class="trail-header">
            <h2><span class="place-name">${escapeHtml(locationLabel)}</span> 코스</h2>

          </div>
          ${stopsHtml}
        </div>
      `;
    }

    genBtn.addEventListener('click', () => {
      const locationLabel = locInput.value.trim();
      if (!locationLabel) {
        locStatus.textContent = '위치를 입력하거나 "내 위치 찾기"를 눌러주세요.';
        locStatus.className = 'loc-status err';
        return;
      }

      const interests = getSelected(interestChips);
      const duration = getSelected(durationChips)[0] || '반나절(3~4시간)';

      genBtn.disabled = true;
      genBtn.textContent = '코스를 짜는 중…';
      renderState('loading', '주변 장소를 조합해 동선을 정리하는 중입니다…');

      window.setTimeout(() => {
        const data = buildDemoItinerary(locationLabel, interests, duration);
        renderItinerary(data, locationLabel);
        genBtn.disabled = false;
        genBtn.textContent = '코스 만들기';
      }, 500);
    });
  </script>

    function translate(text) {
      for (var i = 0; i < DICT.length; i++) {
        var pattern = DICT[i][0], repl = DICT[i][1];
        if (typeof pattern === "string") {
          if (text === pattern) return repl;
        } else {
          var m = pattern.exec(text);
          if (m) return repl(m);
        }
      }
      return null;
    }

    var originalText = new WeakMap();
    var lang = "ko";

    function walk(node) {
      if (node.nodeType === 3) {
        if (!originalText.has(node)) originalText.set(node, node.nodeValue);
        var orig = originalText.get(node);
        var trimmed = orig.trim();
        if (!trimmed) return;
        if (lang === "en") {
          var t = translate(trimmed);
          var next = t !== null ? orig.replace(trimmed, t) : orig;
          if (node.nodeValue !== next) node.nodeValue = next;
        } else if (node.nodeValue !== orig) {
          node.nodeValue = orig;
        }
      } else if (node.nodeType === 1) {
        var tag = node.tagName;
        if (tag === "SCRIPT" || tag === "STYLE" || node.id === "lang-toggle") return;
        for (var i = 0; i < node.childNodes.length; i++) walk(node.childNodes[i]);
        ["placeholder", "title", "aria-label", "alt"].forEach(function (attr) {
          if (!node.hasAttribute(attr)) return;
          var store = node.__i18nAttrs || (node.__i18nAttrs = {});
          if (!(attr in store)) store[attr] = node.getAttribute(attr);
          var origV = store[attr];
          if (lang === "en") {
            var tv = translate(origV.trim());
            var nextV = tv !== null ? origV.replace(origV.trim(), tv) : origV;
            if (node.getAttribute(attr) !== nextV) node.setAttribute(attr, nextV);
          } else if (node.getAttribute(attr) !== origV) {
            node.setAttribute(attr, origV);
          }
        });
      }
    }

    function applyLanguage() { walk(document.body); }

    var btn = document.getElementById("lang-toggle");
    btn.addEventListener("click", function () {
      lang = lang === "ko" ? "en" : "ko";
      btn.textContent = lang === "ko" ? "EN" : "한국어";
      document.documentElement.lang = lang;
      applyLanguage();
    });

    var mo = new MutationObserver(function (mutations) {
      if (lang !== "en") return;
      mutations.forEach(function (m) {
        if (m.type === "childList") {
          m.addedNodes.forEach(function (n) { walk(n); });
        } else if (m.type === "characterData") {
          walk(m.target);
        }
      });
    });
    mo.observe(document.body, { childList: true, subtree: true, characterData: true });
  })();
