<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Speed Clicker!</title>
  <style>
    :root {
      --primary: #8b5cf6;
      --primary-hover: #7c3aed;
      --bg: #0f172a;
      --card-bg: #1e293b;
      --accent: #f43f5e;
      --text: #f8fafc;
    }

    body {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
      background-color: var(--bg);
      color: var(--text);
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      user-select: none;
    }

    .game-card {
      background-color: var(--card-bg);
      padding: 30px;
      border-radius: 24px;
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
      text-align: center;
      width: 420px;
      position: relative;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
      font-weight: 800;
      background: linear-gradient(135deg, #a855f7, #ec4899);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    p.subtitle {
      margin: 0 0 20px 0;
      color: #94a3b8;
      font-size: 14px;
    }

    .dashboard {
      display: flex;
      justify-content: space-between;
      background: rgba(15, 23, 42, 0.6);
      padding: 12px 20px;
      border-radius: 16px;
      margin-bottom: 20px;
      border: 1px solid rgba(255, 255, 255, 0.05);
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .stat-label {
      font-size: 12px;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 1px;
      font-weight: 700;
    }

    .stat-value {
      font-size: 22px;
      font-weight: 800;
      color: #f1f5f9;
    }

    #game-container {
      width: 100%;
      height: 360px;
      background-color: #0f172a;
      border-radius: 16px;
      position: relative;
      overflow: hidden;
      border: 2px dashed rgba(255, 255, 255, 0.1);
      box-sizing: border-box;
    }

    /* 타겟 버튼 스타일 */
    #target {
      width: 50px;
      height: 50px;
      background: linear-gradient(135deg, #ff416c, #ff4b2b);
      border-radius: 50%;
      position: absolute;
      cursor: pointer;
      display: none;
      box-shadow: 0 0 20px rgba(255, 75, 43, 0.6);
      transition: transform 0.05s ease;
      animation: pulse 1s infinite alternate;
    }

    #target:active {
      transform: scale(0.85);
    }

    @keyframes pulse {
      0% { box-shadow: 0 0 10px rgba(255, 75, 43, 0.4); }
      100% { box-shadow: 0 0 25px rgba(255, 75, 43, 0.9); }
    }

    /* 시작 / 오버 오버레이 */
    .overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(4px);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      border-radius: 16px;
      z-index: 10;
    }

    .btn-start {
      background: linear-gradient(135deg, var(--primary), var(--primary-hover));
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 16px;
      font-weight: 700;
      border-radius: 30px;
      cursor: pointer;
      box-shadow: 0 10px 20px rgba(139, 92, 246, 0.3);
      transition: all 0.2s ease;
    }

    .btn-start:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 24px rgba(139, 92, 246, 0.5);
    }

    .game-over-title {
      font-size: 24px;
      font-weight: 800;
      color: #f43f5e;
      margin-bottom: 8px;
    }
  </style>
</head>
<body>

  <div class="game-card">
    <h1>SPEED CLICKER</h1>
    <p class="subtitle">제한 시간 동안 빨간 원을 클릭하세요!</p>

    <div class="dashboard">
      <div class="stat-item">
        <span class="stat-label">Score</span>
        <span class="stat-value" id="score">0</span>
      </div>
      <div class="stat-item">
        <span class="stat-label">Time</span>
        <span class="stat-value" id="time">15s</span>
      </div>
    </div>

    <div id="game-container">
      <div id="target"></div>
      
      <!-- 오버레이 화면 -->
      <div id="overlay" class="overlay">
        <div id="overlay-text" style="display:none;" class="game-over-title">GAME OVER</div>
        <button id="start-btn" class="btn-start" onclick="startGame()">게임 시작</button>
      </div>
    </div>
  </div>

  <script>
    const gameContainer = document.getElementById('game-container');
    const target = document.getElementById('target');
    const scoreSpan = document.getElementById('score');
    const timeSpan = document.getElementById('time');
    const overlay = document.getElementById('overlay');
    const overlayText = document.getElementById('overlay-text');
    const startBtn = document.getElementById('start-btn');

    let score = 0;
    let timeLeft = 15;
    let timerInterval;

    function startGame() {
      score = 0;
      timeLeft = 15;
      scoreSpan.innerText = score;
      timeSpan.innerText = timeLeft + 's';

      overlay.style.display = 'none';
      target.style.display = 'block';

      showTarget();

      // 카운트다운 타이머
      timerInterval = setInterval(() => {
        timeLeft--;
        timeSpan.innerText = timeLeft + 's';

        if (timeLeft <= 0) {
          endGame();
        }
      }, 1000);
    }

    function showTarget() {
      const maxX = gameContainer.clientWidth - target.clientWidth;
      const maxY = gameContainer.clientHeight - target.clientHeight;
      const randomX = Math.floor(Math.random() * maxX);
      const randomY = Math.floor(Math.random() * maxY);

      target.style.left = randomX + 'px';
      target.style.top = randomY + 'px';
    }

    target.addEventListener('click', () => {
      score++;
      scoreSpan.innerText = score;
      showTarget();
    });

    function endGame() {
      clearInterval(timerInterval);
      target.style.display = 'none';
      overlay.style.display = 'flex';
      overlayText.style.display = 'block';
      overlayText.innerText = `최종 점수: ${score}점!`;
      startBtn.innerText = '다시 하기';
    }
  </script>

  <button id="lang-toggle" style="position:fixed;top:14px;right:14px;z-index:99999;padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.55);color:#fff;font:700 12px system-ui,sans-serif;cursor:pointer;backdrop-filter:blur(4px);">EN</button>
  <script>
  (function () {
    var DICT = [
      ["제한 시간 동안 빨간 원을 클릭하세요!", "Click the red circle before time runs out!"],
      ["게임 시작", "Start Game"],
      ["다시 하기", "Play Again"],
      [/^최종 점수: (\d+)점!$/, function (m) { return "Final Score: " + m[1] + " pts!"; }]
    ];

    function translate(text) {
      for (var i = 0; i < DICT.length; i++) {
        var pattern = DICT[i][0], repl = DICT[i][1];
        if (typeof pattern === "string") {
          if (text === pattern) return repl;
        } else {
          var m = pattern.exec(text);
          if (m) return repl(m);
        }
      }
      return null;
    }

    var originalText = new WeakMap();
    var lang = "ko";

    function walk(node) {
      if (node.nodeType === 3) {
        if (!originalText.has(node)) originalText.set(node, node.nodeValue);
        var orig = originalText.get(node);
        var trimmed = orig.trim();
        if (!trimmed) return;
        if (lang === "en") {
          var t = translate(trimmed);
          var next = t !== null ? orig.replace(trimmed, t) : orig;
          if (node.nodeValue !== next) node.nodeValue = next;
        } else if (node.nodeValue !== orig) {
          node.nodeValue = orig;
        }
      } else if (node.nodeType === 1) {
        var tag = node.tagName;
        if (tag === "SCRIPT" || tag === "STYLE" || node.id === "lang-toggle") return;
        for (var i = 0; i < node.childNodes.length; i++) walk(node.childNodes[i]);
      }
    }

    function applyLanguage() { walk(document.body); }

    var btn = document.getElementById("lang-toggle");
    btn.addEventListener("click", function () {
      lang = lang === "ko" ? "en" : "ko";
      btn.textContent = lang === "ko" ? "EN" : "한국어";
      document.documentElement.lang = lang;
      applyLanguage();
    });

    var mo = new MutationObserver(function (mutations) {
      if (lang !== "en") return;
      mutations.forEach(function (m) {
        if (m.type === "childList") {
          m.addedNodes.forEach(function (n) { walk(n); });
        } else if (m.type === "characterData") {
          walk(m.target);
        }
      });
    });
    mo.observe(document.body, { childList: true, subtree: true, characterData: true });
  })();
  </script>

</body>
</html>
