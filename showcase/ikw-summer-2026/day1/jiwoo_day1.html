<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>오늘 뭐 입지? 🐣 대학생 OOTD 코디 추천</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Jua&family=Gowun+Dodum&display=swap" rel="stylesheet">
<style>
  :root{
    --baby-blue: #8FCBEF;
    --baby-blue-deep: #5FAEDD;
    --baby-blue-light: #E4F4FC;
    --cream: #FFFBF5;
    --pink: #FFD9E6;
    --yellow: #FFF0B8;
    --navy: #33374C;
    --gray: #8A8FA3;
    --white: #FFFFFF;
    --shadow: 0 10px 28px rgba(95, 174, 221, 0.16);
    --shadow-sm: 0 4px 12px rgba(51,55,76,0.06);
    --radius-lg: 28px;
    --radius-md: 20px;
    --radius-sm: 14px;
  }

  *{ box-sizing:border-box; margin:0; padding:0; }

  body{
    font-family:'Gowun Dodum', sans-serif;
    background:
      radial-gradient(circle at 15% 0%, var(--baby-blue-light) 0%, transparent 45%),
      radial-gradient(circle at 90% 15%, var(--pink) 0%, transparent 35%),
      var(--cream);
    min-height:100vh;
    color:var(--navy);
    display:flex;
    justify-content:center;
    padding:24px 12px 60px;
  }

  .app{
    width:100%;
    max-width:460px;
    display:flex;
    flex-direction:column;
    gap:22px;
  }

  /* ---------- Hero ---------- */
  .hero{
    text-align:center;
    padding:18px 10px 6px;
    position:relative;
  }
  .hero .badge{
    display:inline-block;
    background:var(--white);
    border:2px dashed var(--baby-blue-deep);
    color:var(--baby-blue-deep);
    font-family:'Jua', sans-serif;
    font-size:13px;
    padding:5px 14px;
    border-radius:999px;
    margin-bottom:10px;
    letter-spacing:0.5px;
  }
  .hero h1{
    font-family:'Jua', sans-serif;
    font-size:30px;
    line-height:1.35;
    color:var(--navy);
  }
  .hero h1 span{
    color:var(--baby-blue-deep);
  }
  .hero p{
    margin-top:8px;
    font-size:14.5px;
    color:var(--gray);
  }

  /* ---------- Section shared ---------- */
  .section-title{
    font-family:'Jua', sans-serif;
    font-size:17px;
    margin-bottom:12px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .section-title .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:24px; height:24px;
    background:var(--baby-blue);
    color:var(--white);
    border-radius:50%;
    font-size:13px;
    font-family:'Jua', sans-serif;
  }

  /* ---------- Weather cards ---------- */
  .weather-grid{
    display:grid;
    grid-template-columns:repeat(4, 1fr);
    gap:10px;
  }
  .weather-card{
    background:var(--white);
    border:2px solid transparent;
    border-radius:var(--radius-sm);
    box-shadow:var(--shadow-sm);
    padding:14px 4px 10px;
    text-align:center;
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .weather-card:hover{ transform:translateY(-3px); }
  .weather-card .emoji{ font-size:26px; display:block; margin-bottom:6px; }
  .weather-card .label{ font-size:12.5px; color:var(--navy); }
  .weather-card.selected{
    border-color:var(--baby-blue-deep);
    background:var(--baby-blue-light);
    box-shadow:var(--shadow);
    transform:translateY(-3px) scale(1.03);
  }

  /* ---------- Style cards ---------- */
  .style-list{
    display:flex;
    flex-direction:column;
    gap:10px;
  }
  .style-card{
    background:var(--white);
    border:2px solid transparent;
    border-radius:var(--radius-md);
    box-shadow:var(--shadow-sm);
    padding:14px 16px;
    display:flex;
    align-items:center;
    gap:14px;
    cursor:pointer;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .style-card:hover{ transform:translateY(-2px); }
  .style-card .icon{
    font-size:26px;
    width:44px; height:44px;
    display:flex; align-items:center; justify-content:center;
    background:var(--baby-blue-light);
    border-radius:14px;
    flex-shrink:0;
  }
  .style-card .txt strong{ font-size:14.5px; display:block; }
  .style-card .txt span{ font-size:12px; color:var(--gray); }
  .style-card.selected{
    border-color:var(--baby-blue-deep);
    background:linear-gradient(90deg, var(--baby-blue-light), var(--white));
    box-shadow:var(--shadow);
  }
  .style-card.gwajam .icon{ background:var(--baby-blue); color:var(--white); }

  /* ---------- Gwajam forced banner ---------- */
  .gwajam-banner{
    display:none;
    align-items:center;
    gap:10px;
    background:var(--baby-blue);
    color:var(--white);
    border-radius:var(--radius-sm);
    padding:12px 14px;
    font-size:13px;
    font-family:'Jua', sans-serif;
    box-shadow:var(--shadow);
    animation: pop-in .4s cubic-bezier(.34,1.56,.64,1);
  }
  .gwajam-banner.show{ display:flex; }
  .gwajam-banner .b-emoji{ font-size:24px; animation: wiggle 1.1s ease-in-out infinite; }
  @keyframes pop-in{
    0%{ transform:scale(.7); opacity:0; }
    100%{ transform:scale(1); opacity:1; }
  }
  @keyframes wiggle{
    0%,100%{ transform:rotate(-6deg); }
    50%{ transform:rotate(6deg); }
  }

  /* ---------- Result ---------- */
  .result-section{ display:flex; flex-direction:column; gap:14px; }
  .result-card{
    background:var(--white);
    border-radius:var(--radius-lg);
    box-shadow:var(--shadow);
    padding:20px;
    position:relative;
    overflow:hidden;
  }
  .result-card::before{
    content:"";
    position:absolute;
    top:-40px; right:-40px;
    width:120px; height:120px;
    background:var(--baby-blue-light);
    border-radius:50%;
    z-index:0;
  }
  .result-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    position:relative;
    z-index:1;
    margin-bottom:14px;
  }
  .result-header h2{
    font-family:'Jua', sans-serif;
    font-size:17px;
  }
  .result-header .tag{
    font-size:11.5px;
    background:var(--baby-blue-light);
    color:var(--baby-blue-deep);
    padding:4px 10px;
    border-radius:999px;
  }

  .item-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    position:relative;
    z-index:1;
  }
  .item-grid .item-card.wide{ grid-column:1 / -1; }
  .item-card{
    background:var(--cream);
    border-radius:var(--radius-sm);
    padding:12px 10px;
    text-align:center;
    transition: transform .15s ease;
  }
  .item-card .item-emoji{
    font-size:26px;
    display:block;
    margin-bottom:4px;
  }
  .item-card .item-label{
    font-size:10.5px;
    color:var(--gray);
    margin-bottom:2px;
  }
  .item-card .item-value{
    font-size:12.5px;
    font-weight:600;
  }
  .item-card.settle{ animation: settle-pop .3s ease; }
  @keyframes settle-pop{
    0%{ transform:scale(1.12); }
    100%{ transform:scale(1); }
  }
  .item-card.forced{
    background:var(--baby-blue);
    color:var(--white);
  }
  .item-card.forced .item-label{ color:rgba(255,255,255,.85); }

  .comment-box{
    margin-top:14px;
    background:var(--yellow);
    border-radius:var(--radius-sm);
    padding:12px 14px;
    font-size:13px;
    display:flex;
    gap:8px;
    align-items:flex-start;
    position:relative;
    z-index:1;
  }
  .comment-box .quote-emoji{ font-size:16px; }

  .shuffle-btn{
    width:100%;
    background:var(--baby-blue-deep);
    color:var(--white);
    border:none;
    border-radius:999px;
    padding:15px;
    font-family:'Jua', sans-serif;
    font-size:15px;
    cursor:pointer;
    box-shadow:var(--shadow);
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    transition: transform .15s ease, background .15s ease;
  }
  .shuffle-btn:hover{ background:#4C9DD0; transform:translateY(-2px); }
  .shuffle-btn:active{ transform:translateY(0); }
  .shuffle-btn .dice{ display:inline-block; }
  .shuffle-btn.spinning .dice{ animation: spin .5s linear infinite; }
  @keyframes spin{
    100%{ transform:rotate(360deg); }
  }

  .empty-hint{
    text-align:center;
    color:var(--gray);
    font-size:13px;
    padding:26px 10px;
    background:var(--white);
    border-radius:var(--radius-md);
    border:2px dashed var(--baby-blue);
  }

  footer{
    text-align:center;
    font-size:11.5px;
    color:var(--gray);
    padding-top:6px;
  }

  @media (max-width:360px){
    .weather-card .label{ font-size:11px; }
  }
</style>
</head>
<body>

<div class="app">

  <div class="hero">
    <span class="badge">경운대 국룰 코디 도우미</span>
    <h1>오늘 뭐 입지? <span>OOTD</span> 🐣</h1>

</div>

/* ---------------- 상태 & 렌더 ---------------- */
const state = { weather:null, style:null };

const weatherGrid = document.getElementById('weatherGrid');
const styleList = document.getElementById('styleList');
const gwajamBanner = document.getElementById('gwajamBanner');
const emptyHint = document.getElementById('emptyHint');
const resultCard = document.getElementById('resultCard');
const resultTag = document.getElementById('resultTag');
const itemGrid = document.getElementById('itemGrid');
const commentText = document.getElementById('commentText');
const shuffleBtn = document.getElementById('shuffleBtn');

function pickRandom(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

weathers.forEach(w=>{
  const card = document.createElement('div');
  card.className = 'weather-card';
  card.dataset.key = w.key;
  card.innerHTML = `<span class="emoji">${w.emoji}</span><span class="label">${w.label}</span>`;
  card.addEventListener('click', ()=>{
    state.weather = w.key;
    document.querySelectorAll('.weather-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    tryRender(true);
  });
  weatherGrid.appendChild(card);
});

styles.forEach(s=>{
  const card = document.createElement('div');
  card.className = 'style-card' + (s.special ? ' gwajam' : '');
  card.dataset.key = s.key;
  card.innerHTML = `
    <div class="icon">${s.icon}</div>
    <div class="txt"><strong>${s.title}</strong><span>${s.desc}</span></div>
  `;
  card.addEventListener('click', ()=>{
    state.style = s.key;
    document.querySelectorAll('.style-card').forEach(c=>c.classList.remove('selected'));
    card.classList.add('selected');
    gwajamBanner.classList.toggle('show', s.key === 'gwajam');
    tryRender(true);
  });
  styleList.appendChild(card);
});

function tryRender(animate){
  if(!state.weather || !state.style) return;
  emptyHint.style.display = 'none';
  resultCard.style.display = 'block';
  shuffleBtn.style.display = 'flex';

  const weatherInfo = weathers.find(w=>w.key===state.weather);
  const styleInfo = styles.find(s=>s.key===state.style);
  resultTag.textContent = `${weatherInfo.emoji} ${weatherInfo.label} · ${styleInfo.title}`;

  buildItemGrid(animate);
  setComment();
}

function buildItemGrid(animate){
  const pool = outfitData[state.weather][state.style];
  itemGrid.innerHTML = '';

  itemMeta.forEach(meta=>{
    const isForcedOuter = (state.style === 'gwajam' && meta.key === 'outer');
    const finalValue = pickRandom(pool[meta.key]);

    const el = document.createElement('div');
    el.className = 'item-card' + (isForcedOuter ? ' forced' : '');
    el.dataset.key = meta.key;
    el.innerHTML = `
      <span class="item-label">${meta.label}${isForcedOuter ? ' · 강제 소환 🚨' : ''}</span>
      <span class="item-value">${finalValue}</span>
    `;
    itemGrid.appendChild(el);
  });

  // 소지품 카드는 넓게
  const accEl = itemGrid.querySelector('[data-key="accessory"]');
  if(accEl) accEl.classList.add('wide');

  if(animate){
    itemGrid.querySelectorAll('.item-card').forEach(el=>{
      el.classList.add('settle');
      setTimeout(()=>el.classList.remove('settle'), 300);
    });
  }
}

function setComment(){
  let pool = commentsGeneral;
  if(state.style === 'gwajam') pool = commentsGeneral.concat(commentsGwajam);
  commentText.textContent = pickRandom(pool);
}

/* ---------------- 셔플 (슬롯머신 연출) ---------------- */
shuffleBtn.addEventListener('click', ()=>{
  if(!state.weather || !state.style) return;
  shuffleBtn.classList.add('spinning');
  shuffleBtn.disabled = true;

  const pool = outfitData[state.weather][state.style];
  const cards = itemGrid.querySelectorAll('.item-card');
  const duration = 1000;
  const interval = 70;

  const finalValues = {};
  itemMeta.forEach(meta=>{ finalValues[meta.key] = pickRandom(pool[meta.key]); });

  cards.forEach(card=>{
    const key = card.dataset.key;
    const valueEl = card.querySelector('.item-value');
    const isForcedOuter = (state.style === 'gwajam' && key === 'outer');

    if(isForcedOuter){
      // 과잠은 흔들리기만 하고 결과는 항상 고정
      card.style.transform = 'scale(1.05) rotate(-2deg)';
      setTimeout(()=>{ card.style.transform=''; }, duration);
      return;
    }

    const t = setInterval(()=>{
      valueEl.textContent = pickRandom(pool[key]);
    }, interval);

    setTimeout(()=>{
      clearInterval(t);
      valueEl.textContent = finalValues[key];
      card.classList.add('settle');
      setTimeout(()=>card.classList.remove('settle'), 300);
    }, duration);
  });

  setTimeout(()=>{
    shuffleBtn.classList.remove('spinning');
    shuffleBtn.disabled = false;
    setComment();
  }, duration + 60);
});
</script>
</body>
</html>
