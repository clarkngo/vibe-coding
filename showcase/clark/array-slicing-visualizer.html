<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Array Slicing Visualizer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: system-ui, -apple-system, sans-serif;
    background: #e8f4fc;
    color: #123;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 28px 16px 60px;
  }
  .wrap { width: 100%; max-width: 560px; }
  a.home {
    display: inline-block;
    margin-bottom: 8px;
    color: #0a3d62;
    font-size: 0.85rem;
    text-decoration: none;
  }
  a.home:hover { text-decoration: underline; }
  h1 {
    text-align: center;
    color: #0a3d62;
    font-size: 1.4rem;
    margin-bottom: 6px;
  }
  .sub {
    text-align: center;
    color: #555;
    font-size: 0.9rem;
    line-height: 1.4;
    margin-bottom: 22px;
  }
  code { font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; }

  .panel {
    background: #fff;
    border: 2px solid #0a3d62;
    border-radius: 12px;
    padding: 18px;
    margin-bottom: 16px;
  }

  .input-row { display: flex; gap: 8px; }
  #expr {
    flex: 1;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 1rem;
    padding: 10px 12px;
    border: 2px solid #b8d6ea;
    border-radius: 8px;
    color: #0a3d62;
    outline: none;
  }
  #expr:focus { border-color: #0a3d62; }
  #apply-btn {
    font-family: inherit;
    font-weight: 700;
    font-size: 0.9rem;
    padding: 10px 18px;
    background: #0a3d62;
    color: #fff;
    border: none;
    border-radius: 8px;
    cursor: pointer;
  }
  #apply-btn:hover { background: #124a76; }

  .error {
    margin-top: 10px;
    font-size: 0.85rem;
    color: #c0392b;
    min-height: 1.2em;
  }

  .examples {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-top: 12px;
  }
  .examples button {
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 0.78rem;
    background: #e8f4fc;
    color: #1565a0;
    border: 1px solid #b8d6ea;
    border-radius: 999px;
    padding: 5px 11px;
    cursor: pointer;
  }
  .examples button:hover { background: #d6eaf8; border-color: #0a3d62; }

  .grid-panel { display: flex; flex-direction: column; align-items: center; }
  .grid {
    display: grid;
    grid-template-columns: repeat(3, 76px);
    grid-template-rows: repeat(3, 76px);
    gap: 6px;
    margin: 4px 0 14px;
  }
  .cell {
    background: #f4f8fb;
    border: 2px solid #cfe0ea;
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 1.5rem;
    font-weight: 700;
    color: #789;
    position: relative;
    transition: background 0.15s, border-color 0.15s, color 0.15s, transform 0.1s;
  }
  .cell .idx {
    position: absolute;
    top: 3px;
    left: 5px;
    font-size: 0.6rem;
    font-weight: 600;
    color: #aab;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
  }
  .cell.selected {
    background: #0a3d62;
    border-color: #0a3d62;
    color: #fff;
    transform: scale(1.04);
  }
  .cell.selected .idx { color: #bcd6ea; }

  .axis-labels {
    display: grid;
    grid-template-columns: repeat(3, 76px);
    gap: 6px;
    font-size: 0.7rem;
    color: #789;
    text-align: center;
    margin-bottom: 2px;
  }

  .output {
    background: #f4f8fb;
    border-radius: 8px;
    padding: 12px 14px;
    width: 100%;
    font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
    font-size: 0.85rem;
    color: #123;
    line-height: 1.6;
    white-space: pre-wrap;
  }
  .output .label { color: #7d8a9a; font-family: system-ui, sans-serif; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.04em; }
  .output .shape { color: #0a3d62; font-weight: 700; }
</style>
</head>
<body>
<div class="wrap">
  <a class="home" href="../">&larr; Back to showcase</a>
  <h1>🔢 Array Slicing Visualizer</h1>
  <p class="sub">Type a NumPy-style slice like <code>arr[:2, 1:]</code> to see which cells<br>it selects and what shape you get back.</p>

  <div class="panel">
    <div class="input-row">
      <input id="expr" type="text" value="arr[:2, 1:]" spellcheck="false" autocomplete="off" />
      <button id="apply-btn">Apply</button>
    </div>
    <div class="error" id="error"></div>
    <div class="examples" id="examples"></div>
  </div>

  <div class="panel grid-panel">
    <div class="axis-labels"><span>col 0</span><span>col 1</span><span>col 2</span></div>
    <div class="grid" id="grid"></div>
    <div class="output" id="output"></div>
  </div>
</div>

<script>
  const N = 3;
  const BASE = [[0, 1, 2], [3, 4, 5], [6, 7, 8]];

  const exprEl = document.getElementById('expr');
  const applyBtn = document.getElementById('apply-btn');
  const errorEl = document.getElementById('error');
  const gridEl = document.getElementById('grid');
  const outputEl = document.getElementById('output');
  const examplesEl = document.getElementById('examples');

  const EXAMPLES = [
    'arr[:2, 1:]',
    'arr[1, :]',
    'arr[:, 0]',
    'arr[1:, 1:]',
    'arr[::-1]',
    'arr[:, ::-1]',
    'arr[0, 0]',
    'arr[::2, ::2]'
  ];

  // Build the 3x3 grid cells once.
  const cellEls = [];
  for (let r = 0; r < N; r++) {
    cellEls.push([]);
    for (let c = 0; c < N; c++) {
      const el = document.createElement('div');
      el.className = 'cell';
      el.innerHTML = `<span class="idx">${r},${c}</span>${BASE[r][c]}`;
      gridEl.appendChild(el);
      cellEls[r].push(el);
    }
  }

  EXAMPLES.forEach(ex => {
    const btn = document.createElement('button');
    btn.textContent = ex;
    btn.addEventListener('click', () => {
      exprEl.value = ex;
      run();
    });
    examplesEl.appendChild(btn);
  });

  function parseIntStrict(s) {
    if (!/^-?\d+$/.test(s)) throw new Error(`invalid literal for index: "${s}"`);
    return parseInt(s, 10);
  }

  // Faithful port of Python's slice.indices(length) resolution.
  function pySliceIndices(start, stop, step, length) {
    step = (step === undefined) ? 1 : step;
    if (step === 0) throw new Error('slice step cannot be zero');
    const negativeStep = step < 0;

    function clampStart(i) {
      if (i < 0) { i += length; if (i < 0) i = negativeStep ? -1 : 0; }
      else if (i >= length) i = negativeStep ? length - 1 : length;
      return i;
    }
    function clampStop(i) {
      if (i < 0) { i += length; if (i < 0) i = negativeStep ? -1 : 0; }
      else if (i >= length) i = negativeStep ? length - 1 : length;
      return i;
    }

    let startIdx = (start === undefined) ? (negativeStep ? length - 1 : 0) : clampStart(start);
    let stopIdx = (stop === undefined) ? (negativeStep ? -1 : length) : clampStop(stop);

    const indices = [];
    if (negativeStep) {
      for (let i = startIdx; i > stopIdx; i += step) if (i >= 0 && i < length) indices.push(i);
    } else {
      for (let i = startIdx; i < stopIdx; i += step) if (i >= 0 && i < length) indices.push(i);
    }
    return indices;
  }

  function parseDim(raw, length) {
    const str = raw.trim();
    if (str === '' || str === ':') {
      return { type: 'slice', indices: pySliceIndices(undefined, undefined, undefined, length) };
    }
    if (str.includes(':')) {
      const parts = str.split(':');
      if (parts.length > 3) throw new Error(`too many colons in "${str}"`);
      const toNum = s => (s.trim() === '' ? undefined : parseIntStrict(s.trim()));
      const start = toNum(parts[0]);
      const stop = parts.length > 1 ? toNum(parts[1]) : undefined;
      const step = parts.length > 2 ? toNum(parts[2]) : undefined;
      return { type: 'slice', indices: pySliceIndices(start, stop, step, length) };
    }
    const orig = parseIntStrict(str);
    let idx = orig;
    if (idx < 0) idx += length;
    if (idx < 0 || idx >= length) {
      throw new Error(`index ${orig} is out of bounds for axis with size ${length}`);
    }
    return { type: 'index', indices: [idx] };
  }

  function extractBracketContent(input) {
    const trimmed = input.trim();
    const m = trimmed.match(/^[A-Za-z_$][\w$]*\s*\[([\s\S]*)\]\s*$/);
    if (m) return m[1];
    if (trimmed.startsWith('[') && trimmed.endsWith(']')) return trimmed.slice(1, -1);
    return trimmed;
  }

  function formatShape(parts) {
    if (parts.length === 0) return '()';
    if (parts.length === 1) return `(${parts[0]},)`;
    return `(${parts.join(', ')})`;
  }

  function formatResult(value) {
    if (Array.isArray(value)) {
      if (Array.isArray(value[0])) {
        return '[' + value.map(row => '[' + row.join(', ') + ']').join(',\n ') + ']';
      }
      return '[' + value.join(', ') + ']';
    }
    return String(value);
  }

  function run() {
    errorEl.textContent = '';
    let rowDim, colDim;
    try {
      const content = extractBracketContent(exprEl.value);
      const dims = content.split(',').map(s => s.trim());
      if (dims.length > 2) throw new Error('this grid is 2-D — expected at most 2 comma-separated indices');
      rowDim = parseDim(dims[0] ?? ':', N);
      colDim = parseDim(dims.length > 1 ? dims[1] : ':', N);
    } catch (err) {
      errorEl.textContent = 'Error: ' + err.message;
      cellEls.flat().forEach(el => el.classList.remove('selected'));
      outputEl.innerHTML = '';
      return;
    }

    const selected = new Set();
    for (const r of rowDim.indices) for (const c of colDim.indices) selected.add(r + ',' + c);
    for (let r = 0; r < N; r++) {
      for (let c = 0; c < N; c++) {
        cellEls[r][c].classList.toggle('selected', selected.has(r + ',' + c));
      }
    }

    let result;
    if (rowDim.type === 'index' && colDim.type === 'index') {
      result = BASE[rowDim.indices[0]][colDim.indices[0]];
    } else if (rowDim.type === 'index') {
      result = colDim.indices.map(c => BASE[rowDim.indices[0]][c]);
    } else if (colDim.type === 'index') {
      result = rowDim.indices.map(r => BASE[r][colDim.indices[0]]);
    } else {
      result = rowDim.indices.map(r => colDim.indices.map(c => BASE[r][c]));
    }

    const shapeParts = [];
    if (rowDim.type === 'slice') shapeParts.push(rowDim.indices.length);
    if (colDim.type === 'slice') shapeParts.push(colDim.indices.length);

    outputEl.innerHTML =
      `<span class="label">Result</span>\n${formatResult(result)}\n\n` +
      `<span class="label">Shape</span>\n<span class="shape">${formatShape(shapeParts)}</span>`;
  }

  applyBtn.addEventListener('click', run);
  exprEl.addEventListener('keydown', e => { if (e.key === 'Enter') run(); });
  exprEl.addEventListener('input', run);

  run();
</script>
</body>
</html>
